[color]

bg = #2e3440
bg-alt = #3b4252
fg = #d8dee9
fg-alt = #4c566a

accent = #81a1c1

green = #a3be8c
yellow = #ebcb8b
purpul = #b48ead
red = #bf616a
cyan = #88c0d0

;==========================================================

[bar/main]
width = 100%
height = 32
bottom = false
radius = 0
fixed-center = false
line-size = 3
border-size = 4
module-margin-right = 1

tray-position = right
tray-background = ${color.bg}
tray-padding = 2

wm-restack = bspwm

background = ${color.bg}
foreground = ${color.fg}

;==========================================================

font-0 = "Mononoki:pixelsize=10;3"
font-1 = "Iosevka Nerd Font:size=13;4"
font-2 = "Font Awesome 5:size=13;5"


;==========================================================

enable-ipc = true
cursor-click = pointer

scroll-up = bspwm-wsnext
scroll-down = bspwm-wsprev

;== Module Location ========================================================

modules-left = herbstluftwm bspwm xwindow
modules-right = pkg cputemp memory cpuload volume time
;== Modules ========================================================

[module/menu]
type = custom/text
content = 

content-background = ${color.bg}
content-foreground = ${color.fg}
content-padding = 1

click-left = /home/phanindra/xmenu/xmenu.sh

[module/xwindow]
type = internal/xwindow
format = <label>
format-background = ${color.bg}
format-foreground = ${color.fg}
format-padding = 1

label = %title%
label-maxlen = 40

[module/herbstluftwm]
type = custom/script

exec-if = ps -C herbstluftwm >/dev/null 2>&1
exec = MONITOR=HDMI-0 ~/.config/polybar/herbstluftwm.sh
tail = true

[module/bspwm]
type = internal/bspwm
enable-click = true
enable-scroll = true
format = <label-state>
reverse-scroll = true

ws-icon-0 = 1;
ws-icon-1 = 2;
ws-icon-2 = 3;
ws-icon-3 = 4;
ws-icon-4 = 5;
ws-icon-5 = 6;
ws-icon-6 = 7;

label-focused = %icon%
label-focused-foreground = ${color.bg}
label-focused-background = ${color.accent}
label-focused-underline = ${color.bg}
label-focused-overline = ${color.bg}
label-focused-padding = 1

label-occupied = %icon%
label-occupied-forground = ${color.fg}
label-occupied-underline = ${color.bg}
label-occupied-overline = ${color.bg}
label-occupied-padding = 1

label-urgent = %icon%
label-urgent-forground = ${color.red}
label-urgent-underline = ${color.bg}
label-urgent-overline = ${color.bg}
label-urgent-padding = 1

label-empty = %icon%
label-empty-padding = 1
label-empty-foreground = ${color.fg-alt}
label-empty-underline = ${color.bg}
label-empty-overline = ${color.bg}

;==========================================================

[module/pkg]
type = custom/script
exec = ~/.config/polybar/scripts/updates.sh

format-underline = ${color.bg}
format-overline = ${color.bg}

format-prefix = 
format-prefix-padding = 1
format-prefix-background = ${color.cyan}
format-prefix-foreground = ${color.bg}

label-background = ${color.bg-alt}
label-padding = 1

tail = true

[module/cputemp]
type = custom/script
exec = cputemp.py
interval = 2

format-prefix = ""
format-prefix-background = ${color.red}
format-prefix-padding = 1
format-prefix-foreground = ${color.bg}

format-underline = ${color.bg}
format-overline = ${color.bg}

label = %output%
label-padding = 1
label-background = ${color.bg-alt}


[module/cpuload]
type = custom/script
exec = cpuload.py
interval = 3

format-underline = ${color.bg}
format-overline = ${color.bg}

format-prefix-background = ${color.cyan}
format-prefix-foreground = ${color.bg}
format-prefix-padding = 1
format-prefix = ""

label = %output%%
label-padding = 1
label-background = ${color.bg-alt}

[module/memory]
type = custom/script
exec = mem_usage.py
interval = 2

format-underline = ${color.bg}
format-overline = ${color.bg}

format-prefix-background = ${color.purpul}
format-prefix-foreground = ${color.bg}
format-prefix-padding = 1
format-prefix = ""

label = %output%
label-padding = 1
label-background = ${color.bg-alt}

[module/volume]
type = internal/alsa
master-mixer = Master

format-volume = <ramp-volume><label-volume>
format-volume-overline = ${color.bg}
format-volume-underline = ${color.bg}

format-muted = <label-muted>
format-muted-prefix = "婢"
format-muted-prefix-background = ${color.green}
format-muted-prefix-foreground = ${color.bg}
format-muted-prefix-padding = 1
format-muted-underline = ${color.bg}
format-muted-overline = ${color.bg}


label-volume = %percentage%%
label-volume-background = ${color.bg-alt}
label-volume-foreground = ${color.fg}
label-volume-padding = 1

label-muted = "Muted"
label-muted-background = ${color.bg-alt}
label-muted-foreground = ${color.fg}
label-muted-padding = 1


ramp-volume-0 = 奄
ramp-volume-1 = 奄
ramp-volume-2 = 奔
ramp-volume-3 = 奔
ramp-volume-4 = 墳
ramp-volume-5 = 墳
ramp-volume-6 = 墳
ramp-volume-padding = 1
ramp-volume-background = ${color.green}
ramp-volume-foreground = ${color.bg}

[module/date]
type = custom/script
exec = "date '+%b %d %a [%I:%M %p]'"
interval = 1

format-underline = ${color.bg}
format-overline = ${color.bg}

format-prefix = 
format-prefix-background = ${color.yellow}
format-prefix-foreground = ${color.bg}
format-prefix-padding = 1

label = %output%
label-padding = 1
label-background = ${color.bg-alt}

[module/time]
type = internal/date

interval = 1.0
time = %H:%M

date-alt = %a, %d %b %Y

format = <label>
format-underline = ${color.bg}
format-overline = ${color.bg}

format-prefix = 
format-prefix-background = ${color.yellow}
format-prefix-foreground = ${color.bg}
format-prefix-padding = 1

label = %time%%date%
label-background = ${color.bg-alt}
label-padding = 1

;== EOF ========================================================
